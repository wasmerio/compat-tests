name: python-upstream

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      wasmer_ref:
        description: "Wasmer git ref"
        required: false
        default: "main"
      compare_ref:
        description: "Git ref to compare against when publishing"
        required: false
        default: "origin/main"
      cpython_version:
        description: "CPython version/tag"
        required: false
        default: "v3.13.0"
      timeout:
        description: "Job timeout in seconds"
        required: false
        default: "1800"

permissions:
  contents: write

jobs:
  run-python:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install libtinfo
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libtinfo6

      - name: Install LLVM (Linux)
        run: |
          curl -H "Authorization: Bearer ${{ github.token }}" --retry 3 --proto '=https' --tlsv1.2 -sSf https://github.com/wasmerio/llvm-custom-builds/releases/download/21.x/llvm-linux-amd64.tar.xz -L -o /opt/llvm.tar.xz
          mkdir -p /opt/llvm-21
          tar xf /opt/llvm.tar.xz --strip-components=1 -C /opt/llvm-21
          echo '/opt/llvm-21/bin' >> $GITHUB_PATH
          echo 'LLVM_SYS_211_PREFIX=/opt/llvm-21' >> $GITHUB_ENV

      - name: Run Python upstream suite
        run: |
          python3 main.py run-python \
            --wasmer-ref "${{ github.event.inputs.wasmer_ref || 'main' }}" \
            --cpython-version "${{ github.event.inputs.cpython_version || 'v3.13.0' }}" \
            --timeout "${{ github.event.inputs.timeout || '1800' }}"

      - name: Publish snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 main.py publish-snapshot \
            --repo . \
            --source-dir . \
            --branch "${{ github.event.inputs.wasmer_ref || 'main' }}" \
            --compare-ref "${{ github.event.inputs.compare_ref || 'origin/main' }}"
