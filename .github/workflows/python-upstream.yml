name: python-upstream

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      wasmer_ref:
        description: "Wasmer git ref"
        required: false
        default: "main"
      compare_ref:
        description: "Git ref to compare against when publishing"
        required: false
        default: "origin/main"
      cpython_version:
        description: "CPython version/tag"
        required: false
        default: "v3.13.0"
      timeout:
        description: "Job timeout in seconds"
        required: false
        default: "1800"

permissions:
  contents: write
  issues: write

jobs:
  run-python:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      WASMER_REF: ${{ github.event.inputs.wasmer_ref || 'main' }}
      COMPARE_REF: ${{ github.event.inputs.compare_ref || 'origin/main' }}
      CPYTHON_VERSION: ${{ github.event.inputs.cpython_version || 'v3.13.0' }}
      TEST_TIMEOUT: ${{ github.event.inputs.timeout || '1800' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install libtinfo
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libtinfo6

      - name: Install LLVM (Linux)
        if: ${{ env.WASMER_REF != 'main' }}
        run: |
          curl -H "Authorization: Bearer ${{ github.token }}" --retry 3 --proto '=https' --tlsv1.2 -sSf https://github.com/wasmerio/llvm-custom-builds/releases/download/21.x/llvm-linux-amd64.tar.xz -L -o /opt/llvm.tar.xz
          mkdir -p /opt/llvm-21
          tar xf /opt/llvm.tar.xz --strip-components=1 -C /opt/llvm-21
          echo '/opt/llvm-21/bin' >> $GITHUB_PATH
          echo 'LLVM_SYS_211_PREFIX=/opt/llvm-21' >> $GITHUB_ENV

      - name: Run Python upstream suite
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 main.py run-python \
            --wasmer-ref "${WASMER_REF}" \
            --cpython-version "${CPYTHON_VERSION}" \
            --timeout "${TEST_TIMEOUT}"

      - name: Publish snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 main.py publish-snapshot \
            --repo . \
            --source-dir . \
            --branch "${WASMER_REF}" \
            --compare-ref "${COMPARE_REF}"

      - name: Create regression issue
        if: ${{ github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 main.py create-regression-issue \
            --repo . \
            --repo-full-name "${{ github.repository }}" \
            --comparison .git/compat-tests-comparison.json \
            --baseline-metadata .git/compat-tests-baseline-metadata.json \
            --candidate-metadata metadata.json \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
