name: python-upstream

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      wasmer_ref:
        description: "Wasmer git ref"
        required: false
        default: "main"
      compare_ref:
        description: "Git ref to compare against when publishing"
        required: false
        default: "origin/main"
      timeout:
        description: "Job timeout in seconds"
        required: false
        default: "600"
      comment_repo:
        description: "Optional repo to comment back into"
        required: false
        default: ""
      comment_pr_number:
        description: "Optional PR number to comment on"
        required: false
        default: ""
      expected_wasmer_sha:
        description: "Optional expected Wasmer commit for PR-triggered runs"
        required: false
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  run-python:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      WASMER_REF: ${{ github.event.inputs.wasmer_ref || 'main' }}
      COMPARE_REF: ${{ github.event.inputs.compare_ref || 'origin/main' }}
      TEST_TIMEOUT: ${{ github.event.inputs.timeout || '600' }}
      COMMENT_REPO: ${{ github.event.inputs.comment_repo || '' }}
      COMMENT_PR_NUMBER: ${{ github.event.inputs.comment_pr_number || '' }}
      EXPECTED_WASMER_SHA: ${{ github.event.inputs.expected_wasmer_sha || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install libtinfo
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libtinfo6

      - name: Install LLVM (Linux)
        run: |
          curl -H "Authorization: Bearer ${{ github.token }}" --retry 3 --proto '=https' --tlsv1.2 -sSf https://github.com/wasmerio/llvm-custom-builds/releases/download/22.x/llvm-linux-amd64.tar.xz -L -o /opt/llvm.tar.xz
          mkdir -p /opt/llvm-22
          tar xf /opt/llvm.tar.xz --strip-components=1 -C /opt/llvm-22
          echo '/opt/llvm-22/bin' >> $GITHUB_PATH
          echo 'LLVM_SYS_221_PREFIX=/opt/llvm-22' >> $GITHUB_ENV

      - name: Run Python upstream suite
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 main.py run-python \
            --wasmer-ref "${WASMER_REF}" \
            --timeout "${TEST_TIMEOUT}" \
            --compare-ref "${COMPARE_REF}"

      - name: Upload full test log
        id: upload-log
        uses: actions/upload-artifact@v4
        with:
          name: python-upstream-log
          path: test.log
          if-no-files-found: error

      - name: Publish snapshot
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          commit=$(python3 main.py publish-snapshot \
            --repo . \
            --source-dir . \
            --branch "${WASMER_REF}" \
            --compare-ref "${COMPARE_REF}" | tail -n1)
          echo "commit=${commit}" >> "$GITHUB_OUTPUT"

      - name: Create regression issue
        if: ${{ github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 main.py create-regression-issue \
            --repo . \
            --repo-full-name "${{ github.repository }}" \
            --comparison .git/compat-tests-comparison.json \
            --baseline-metadata .git/compat-tests-baseline-metadata.json \
            --candidate-metadata metadata.json \
            --results-repo "${{ github.repository }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Comment on Wasmer PR
        if: ${{ env.COMMENT_REPO != '' && env.COMMENT_PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.WASMER_REPO_GH_TOKEN }}
          EXPECTED_WASMER_SHA: ${{ env.EXPECTED_WASMER_SHA }}
          RESULTS_COMMIT: ${{ steps.publish.outputs.commit }}
        run: |
          python3 main.py prepare-pr-comment \
            --comparison .git/compat-tests-comparison.json \
            --baseline-metadata .git/compat-tests-baseline-metadata.json \
            --candidate-metadata metadata.json \
            --results-repo "${{ github.repository }}" \
            --results-commit "${{ steps.publish.outputs.commit }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --log-artifact-url "${{ steps.upload-log.outputs.artifact-url }}" \
            --expected-wasmer-sha "${EXPECTED_WASMER_SHA}" \
            --output .git/compat-tests-pr-comment.txt
          gh pr comment "${COMMENT_PR_NUMBER}" \
            --repo "${COMMENT_REPO}" \
            --body-file .git/compat-tests-pr-comment.txt
